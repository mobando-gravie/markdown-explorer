name: MarkdownExplorer
options:
  bundleIdPrefix: com.corinthius
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  Markdown:
    url: https://github.com/swiftlang/swift-markdown
    branch: main

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "0.3.3"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"

targets:
  MarkdownExplorer:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MarkdownExplorer
    info:
      path: MarkdownExplorer/Info.plist
      properties:
        CFBundleDisplayName: Markdown Explorer
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: Copyright (c) 2026 Miguel Obando
        NSMainStoryboardFile: ""
    entitlements:
      path: MarkdownExplorer/MarkdownExplorer.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
    dependencies:
      - package: Markdown
        product: Markdown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.corinthius.MarkdownExplorer
        PRODUCT_NAME: MarkdownExplorer
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
