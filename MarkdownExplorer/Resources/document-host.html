<!DOCTYPE html>
<html data-theme="__THEME__">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* base reset + page chrome */
:root {
  color-scheme: light dark;
}
html, body {
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
}
[data-theme="light"] body { background: #ffffff; color: #1f2328; }
[data-theme="dark"]  body { background: #0d1117; color: #e6edf3; }

.markdown-body {
  box-sizing: border-box;
  max-width: 980px;
  margin: 0 auto;
  padding: 24px 28px 80px;
  font-size: 15px;
  line-height: 1.6;
}

/* mermaid container */
.mermaid {
  text-align: center;
  margin: 16px 0;
}
.mermaid-error {
  color: #d33;
  font-family: ui-monospace, Menlo, monospace;
  font-size: 12px;
  white-space: pre-wrap;
  border: 1px solid #d33;
  padding: 8px;
  border-radius: 4px;
}

/* selection highlight matches macOS accent */
::selection {
  background: rgba(0, 122, 255, 0.25);
}

/* ---- github-markdown-css (full bundle) ---- */
__GITHUB_MARKDOWN_CSS__
/* ---- highlight.js theme (light OR dark) ---- */
__HLJS_THEME_CSS__
</style>
</head>
<body class="markdown-body">
<article id="content"></article>

<script>__MARKDOWN_IT_JS__</script>
<script>__TASKLISTS_JS__</script>
<script>__HIGHLIGHT_JS__</script>
<script>__MERMAID_JS__</script>
<script>
(function() {
  try {
    var src = atob('__SOURCE_B64__');
    // markdown-it UMD exposes `window.markdownit`
    var md = window.markdownit({
      html: false,
      linkify: true,
      typographer: true,
      breaks: false,
      highlight: function(code, lang) {
        try {
          if (lang && window.hljs && hljs.getLanguage(lang)) {
            return '<pre><code class="hljs language-' + lang + '">' +
              hljs.highlight(code, { language: lang, ignoreIllegals: true }).value +
              '</code></pre>';
          }
          if (window.hljs) {
            return '<pre><code class="hljs">' + hljs.highlightAuto(code).value + '</code></pre>';
          }
        } catch (e) {}
        return '';
      }
    });
    if (window.markdownitTaskLists) {
      md.use(window.markdownitTaskLists, { enabled: true, label: false });
    }
    document.getElementById('content').innerHTML = md.render(src);

    // promote ```mermaid blocks to <div class="mermaid">
    document.querySelectorAll('pre code.language-mermaid, pre code.hljs.language-mermaid').forEach(function(block) {
      var pre = block.parentElement;
      var raw = block.dataset.raw || block.textContent;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = raw;
      pre.replaceWith(div);
    });

    if (window.mermaid) {
      mermaid.initialize({
        startOnLoad: false,
        theme: document.documentElement.dataset.theme === 'dark' ? 'dark' : 'default',
        securityLevel: 'strict',
        fontFamily: '-apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif'
      });
      mermaid.run({ querySelector: '.mermaid' }).catch(function(err) {
        document.querySelectorAll('.mermaid').forEach(function(el) {
          if (!el.querySelector('svg')) {
            el.classList.add('mermaid-error');
            el.textContent = 'Mermaid error: ' + (err && err.message ? err.message : String(err));
          }
        });
      });
    }
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<pre class="mermaid-error">Render error: ' + (e && e.message ? e.message : String(e)) + '</pre>';
  }
})();
</script>
</body>
</html>
