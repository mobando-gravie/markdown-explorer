<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body {
    margin: 0;
    padding: 12px;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    color: __TEXT_COLOR__;
    overflow: hidden;
  }
  .mermaid {
    text-align: center;
  }
  .mermaid-error {
    color: #d33;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 12px;
    white-space: pre-wrap;
  }
</style>
</head>
<body>
<pre class="mermaid" id="diagram">__SOURCE__</pre>
<script>__MERMAID_JS__</script>
<script>
(function() {
  try {
    mermaid.initialize({
      startOnLoad: false,
      theme: '__THEME__',
      securityLevel: 'strict',
      fontFamily: '-apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif'
    });
    mermaid.run({ querySelector: '.mermaid' }).then(function() {
      requestAnimationFrame(function() {
        var h = document.documentElement.scrollHeight;
        window.webkit.messageHandlers.height.postMessage(h);
      });
    }).catch(function(err) {
      var el = document.getElementById('diagram');
      el.classList.add('mermaid-error');
      el.textContent = 'Mermaid error: ' + (err && err.message ? err.message : String(err));
      window.webkit.messageHandlers.height.postMessage(document.documentElement.scrollHeight);
    });
  } catch (err) {
    var el = document.getElementById('diagram');
    el.classList.add('mermaid-error');
    el.textContent = 'Mermaid load error: ' + (err && err.message ? err.message : String(err));
    window.webkit.messageHandlers.height.postMessage(document.documentElement.scrollHeight);
  }
})();
</script>
</body>
</html>
